services:
  # 1. Backend Web Service
  - type: web
    name: yemen-curriculum-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: node prisma/convert_to_postgres.js && npm install && npx prisma generate && npx prisma db push && node prisma/seed.js && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: yemen-curriculum-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend Web Service (Next.js)
  - type: web
    name: yemen-curriculum-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: yemen-curriculum-backend
          property: host
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false # Set to the Frontend URL after deployment completes

databases:
  - name: yemen-curriculum-db
    plan: free
